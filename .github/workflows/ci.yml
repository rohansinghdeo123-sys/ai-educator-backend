name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python 3.10)
    runs-on: ubuntu-latest
    env:
      ALLOW_SQLITE_FALLBACK: "true"
      DATABASE_URL: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall -q main.py app routers services Logic prompts
      - name: Run test suite
        run: python -m unittest discover -s tests -p "test_*.py" -v

  security-audit:
    name: Dependency audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ai-educator-backend:ci .
