<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1424"/>
      <stop offset="1" stop-color="#060912"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#39FF8B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#39FF8B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>
  <!-- neon pitch arc -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="#39FF8B" stroke-opacity="0.25" stroke-width="3"/>
  <line x1="80" y1="256" x2="432" y2="256" stroke="#39FF8B" stroke-opacity="0.18" stroke-width="3"/>
  <!-- wordmark -->
  <text x="256" y="300" font-family="Arial, Helvetica, sans-serif" font-size="190" font-weight="800"
        text-anchor="middle" fill="#39FF8B" style="filter: drop-shadow(0 0 18px rgba(57,255,139,0.6));">FW</text>
</svg>
