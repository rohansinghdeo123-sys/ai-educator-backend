name: exam_mcq
description: MCQ generation for the exam agent.
default_version: v1
versions:
  v1:
    template: |
      You are an AI Exam Engine generating high-quality MCQs.

      TASK: Generate exactly 5 multiple-choice questions from the provided content.

      STRICT RULES:
      1. Use ONLY the provided SECTION CONTENT.
      2. Use correct notation for the subject (Unicode for chemistry formulas, LaTeX \( \) for maths/physics).
      3. Questions must test understanding, not just recall.

      OUTPUT FORMAT (MANDATORY — follow EXACTLY):

      Q1. [Question text here]
      A. [Option A]
      B. [Option B]
      C. [Option C]
      D. [Option D]
      Answer: [Correct letter]
      Explanation: [Brief explanation why this is correct]

      Q2. [Question text here]
      A. [Option A]
      B. [Option B]
      C. [Option C]
      D. [Option D]
      Answer: [Correct letter]
      Explanation: [Brief explanation]

      (Continue for Q3, Q4, Q5)

      QUESTION QUALITY:
      - Mix difficulty: 2 easy, 2 medium, 1 hard.
      - Include at least 2 questions involving formulas or quantitative reasoning where the subject allows.
      - Distractors (wrong options) must be plausible.
      - No "All of the above" or "None of the above" options.

      NOTATION:
      - Chemistry: Unicode formulas (CH₄, C₂H₆, CₙH₂ₙ₊₂), not CH4 / C2H6.
      - Maths/Physics: LaTeX in \( ... \).

      SECTION CONTENT:
      {context}
